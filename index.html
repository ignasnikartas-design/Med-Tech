  // ====================================================================
  // Settings Menu
  // ====================================================================
  function SettingsMenu({ open, onClose, scribingLang, setScribingLang, uiLang, setUiLang }) {
    const ref = useRef(null);
    const [view, setView] = useState("main");
    const SCRIBING_LANGS = ["Lithuanian", "English", "Russian", "Polish"];
    const INTERFACE_LANGS = ["English", "Lietuvių"];
    useEffect(() => {
      if (!open) return;
      setView("main");
      const onMouseDown = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
      const onKey = (e) => { if (e.key === "Escape") onClose(); };
      document.addEventListener("mousedown", onMouseDown);
      document.addEventListener("keydown", onKey);
      return () => {
        document.removeEventListener("mousedown", onMouseDown);
        document.removeEventListener("keydown", onKey);
      };
    }, [open, onClose]);
    if (!open) return null;
    const langView = (title, options, current, onPick) => (
      <div>
        <button className="settings-row" onClick={() => setView("main")} style={{ borderBottom: "1px solid var(--border-soft)" }}>
          <span className="ico" style={{ transform: "rotate(180deg)" }}>{I.ChevR}</span>
          <span className="label" style={{ fontSize: 12, textTransform: "uppercase", letterSpacing: "0.06em", color: "var(--muted)", fontWeight: 600 }}>{title}</span>
        </button>
        {options.map((opt) => (
          <button key={opt} className="settings-row" onClick={() => onPick(opt)} style={{ borderBottom: "none" }}>
            <span className="ico" />
            <span className="label">{opt}</span>
            {opt === current && <span className="value">{I.Check}</span>}
          </button>))}
      </div>);
    return (
      <div className="settings-menu" ref={ref}>
        {view === "main" && (
          <div>
            <div className="settings-profile">
              <div className="settings-name">Mindaugas J.</div>
              <div className="settings-email">m.jonaitis@affidea.lt</div>
            </div>
            <button className="settings-row" onClick={() => setView("scribing")} style={{ borderBottom: "none" }}>
              <span className="ico">{I.MicSm}</span>
              <span className="label">Scribing language</span>
              <span className="value">{scribingLang} {I.ChevR}</span>
            </button>
            <button className="settings-row" onClick={() => setView("interface")}>
              <span className="ico">{I.Chats}</span>
              <span className="label">Interface language</span>
              <span className="value">{uiLang} {I.ChevR}</span>
            </button>
            <button className="settings-row danger" onClick={onClose}>
              <span className="ico">{I.LogOut}</span>
              <span className="label">Sign out</span>
            </button>
          </div>)}
        {view === "scribing" && langView("Scribing language", SCRIBING_LANGS, scribingLang, (v) => { setScribingLang(v); setView("main"); })}
        {view === "interface" && langView("Interface language", INTERFACE_LANGS, uiLang, (v) => { setUiLang(v); setView("main"); })}
      </div>);

  }

  // ====================================================================
  // Top Nav
  // ====================================================================
  function TopNav({ scribingLang, setScribingLang, uiLang, setUiLang }) {
    const [navTab, setNavTab] = useState("dashboard");
    const [settingsOpen, setSettingsOpen] = useState(false);
    const links = [];

    return (
      <div className="topnav">
        <div className="nav-logo">
          <div className="nav-logo-icon">A</div>
          <span className="nav-logo-name">ADA</span>
        </div>
        <div className="nav-links">
          {links.map((l) =>
          <button
            key={l.id}
            className={`nav-link${navTab === l.id ? " active" : ""}`}
            onClick={() => setNavTab(l.id)}>
            
              {l.icon}
              {l.label}
            </button>
          )}
        </div>
        <div className="nav-right">
          <div className="settings-anchor">
            <button
              className="nav-av-btn"
              onClick={() => setSettingsOpen((o) => !o)}
              aria-label="Profile and settings">
              <span className="nav-av">MJ</span>
              <span className="nav-av-chev">{I.ChevDown}</span>
            </button>
            <SettingsMenu
              open={settingsOpen}
              onClose={() => setSettingsOpen(false)}
              scribingLang={scribingLang}
              setScribingLang={setScribingLang}
              uiLang={uiLang}
              setUiLang={setUiLang} />
            
          </div>
        </div>
      </div>);

  }

  const AV_COLORS = [
  { bg: "#F3E8FF", c: "#7C3AED" },

  { bg: "#ECFDF5", c: "#065F46" },

  function PatientRow({ p, active }) {
    return (
      <button className={`pat-row${active ? " active" : ""}`}>
        <div className="pat-av">{p.initials}</div>
        <div className="pat-info">
          <div className="pat-name">{p.name}</div>
        </div>
        <span className="pat-time">{p.time}</span>
      </button>);

  }

  function PatientListCard({ scribing, seconds, toggle, onCollapse }) {
    const fmt = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
    return (
      <div className="card" style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
        <div style={{ padding: 16, borderBottom: "1px solid var(--border-soft)" }}>
          <button className={`scribe-trigger${scribing ? " recording" : ""}`} onClick={toggle}>
            {scribing ? <span className="rec-dot" /> : I.Mic}
            <span className="scribe-trigger-label">
              {scribing ? `Stop scribing · ${fmt(seconds)}` : "Start scribing"}
            </span>
          </button>
        </div>
        <div className="card-head" style={{ borderBottom: "none", padding: "14px 16px 0" }}>
          <span className="card-title" style={{ fontSize: "14px", lineHeight: "1.4", letterSpacing: "0px" }}>Patients</span>
        </div>
        <div className="patient-list">
          <div className="day-sep">today · {M.patientsToday.length}</div>
          {M.patientsToday.map((p, i) =>
          <PatientRow key={p.id} p={p} active={!!p.active} />
          )}
          <div className="day-sep day-sep-older">older · {M.patientsOlder.length}</div>
          {M.patientsOlder.map((p, i) =>
          <PatientRow key={p.id} p={p} active={false} />
          )}
        </div>
        <div className="card-footer-collapse">
          <button className="collapse-btn-footer" onClick={onCollapse} aria-label="Collapse sidebar">{I.PanelLeftClose}</button>
        </div>
      </div>);

  }

  // ====================================================================
  // Patient Header (center column)
  // ====================================================================
  function PatientHeader() {
    const [name, setName] = useState("");
    const initials = name.trim() ? name.trim().split(/\s+/).map((w) => w[0] || "").slice(0, 2).join("").toUpperCase() : "—";
    return (
      <div className="card patient-header-card">
        <div className="ph-id">
          <div className="ph-av" style={!name.trim() ? { background: "var(--border-soft)", color: "var(--muted)" } : null}>{initials}</div>
          <div className="ph-text" style={{ flex: 1, minWidth: 0 }}>
            <input
              type="text"
              value={name}
              onChange={(e) => setName(e.target.value)}
              placeholder="Add patient name"
              aria-label="Patient name"
              style={{
                width: "100%",
                padding: "4px 8px",
                margin: "-4px -8px",
                background: "transparent",
                border: "1px solid transparent",
                borderRadius: 6,
                fontFamily: "inherit",
                fontSize: 16, fontWeight: 700,
                color: "var(--ink)",
                outline: "none",
                transition: "background 120ms, border-color 120ms"
              }}
              onFocus={(e) => { e.currentTarget.style.background = "white"; e.currentTarget.style.borderColor = "var(--teal)"; }}
              onBlur={(e) => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = "transparent"; }}
              onMouseEnter={(e) => { if (document.activeElement !== e.currentTarget) e.currentTarget.style.background = "var(--border-soft)"; }}
              onMouseLeave={(e) => { if (document.activeElement !== e.currentTarget) e.currentTarget.style.background = "transparent"; }} />
            <div className="ph-encounter">Encounter 04-17 · Apr 17, 2026</div>
          </div>
        </div>
      </div>);

  }

  // ====================================================================
  // Context curation
  // ====================================================================
  function Toggle({ on, onChange }) {
    return (
      <button
        type="button"
        onClick={onChange}
        role="switch"
        aria-checked={on}
        style={{
          width: 32, height: 18, borderRadius: 999,
          background: on ? "var(--teal)" : "#D5DBE3",
          border: "none", position: "relative", cursor: "pointer",
          transition: "background 150ms cubic-bezier(0, 0, 0.2, 1)",
          flexShrink: 0, padding: 0
        }}>
        <span style={{
          position: "absolute", top: 2, left: on ? 16 : 2,
          width: 14, height: 14, borderRadius: "50%",
          background: "white",
          boxShadow: "0 1px 2px rgba(0,0,0,0.15)",
          transition: "left 150ms cubic-bezier(0, 0, 0.2, 1)"
        }} />
      </button>);

  }

  function ContextDrawer({ sources, onToggle, onClose }) {
    const ref = useRef(null);
    useEffect(() => {
      const onDown = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
      const onKey = (e) => { if (e.key === "Escape") onClose(); };
      document.addEventListener("mousedown", onDown);
      document.addEventListener("keydown", onKey);
      return () => {
        document.removeEventListener("mousedown", onDown);
        document.removeEventListener("keydown", onKey);
      };
    }, [onClose]);
    const selectedCount = sources.filter((s) => s.selected).length;
    return (
      <div ref={ref} style={{
        margin: "0 16px 8px",
        background: "white",
        border: "1px solid var(--border)",
        borderRadius: 12,
        boxShadow: "0 8px 24px rgba(0,0,0,0.08)",

  // ====================================================================
  // Chat
  // ====================================================================
  function ChatCard({ messages, onSend, onAction, scribing, scribeSeconds, onToggleScribe, sources, onToggleSource, onAddObservation }) {
    const [val, setVal] = useState("");
    const scrollRef = useRef(null);
    useEffect(() => {
      if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }, [messages.length]);

    const quickActions = [
    { icon: I.Docs, label: "Draft E025" },
    { icon: I.SendChip, label: "Generate Referral (E027)" },
    { icon: I.Pill, label: "Draft Prescription" },
    { icon: I.Beaker, label: "Order Tests" }];


    const submit = () => {
      const t = val.trim();
      if (!t) return;
      onSend(t);
      setVal("");
    };
    const addAsObservation = () => {
      const t = val.trim();
      if (!t || !onAddObservation) return;
      onSend(t);
      onAddObservation(t);
      setVal("");
    };
    const hasText = val.trim().length > 0;

    const [contextOpen, setContextOpen] = useState(false);
    const selectedCount = (sources || []).filter((s) => s.selected).length;

    const fmtTime = (s) => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;

    return (
      <div className="card chat-card">
        <div style={{
          display: "flex",
          justifyContent: "center",
          flexShrink: 0,
          padding: "16px 16px 4px"
        }}>
          <button
            onClick={onToggleScribe}
            aria-label={scribing ? "Stop scribing" : "Start scribing"}
            style={{
              width: 320,
              padding: "8px 8px 8px 14px",
              background: scribing ? "#FAFAFA" : "var(--teal-tint)",
              border: `1px solid ${scribing ? "#FECACA" : "var(--teal-border)"}`,
              color: "var(--ink)",
              borderRadius: 8,
              fontSize: 16,
              fontWeight: 500,
              display: "inline-flex",
              alignItems: "center",
              gap: 10,
              cursor: "pointer",
              transition: "background 150ms, border-color 150ms, color 150ms"
            }}>
            {scribing ? <span className="rec-dot" /> : React.cloneElement(I.Mic, { width: 20, height: 20, strokeWidth: 1.8 })}
            <span style={{ flex: 1, textAlign: "left", fontVariantNumeric: scribing ? "tabular-nums" : "normal" }}>
              {scribing ? `Recording · ${fmtTime(scribeSeconds || 0)}` : "Ready to scribe"}
            </span>
            <span style={{
              padding: "6px 14px",
              background: scribing ? "var(--border-soft)" : "white",
              border: scribing ? "none" : "1px solid var(--teal-border)",
              color: scribing ? "var(--ink)" : "var(--teal)",
              borderRadius: 8,
              fontSize: 14,
              fontWeight: 500,
              display: "inline-flex",
              alignItems: "center"
            }}>
              {scribing ? "Stop" : "Start"}
            </span>
          </button>
        </div>
        <div className="chat-msgs" ref={scrollRef}>
          {messages.map((m, i) =>
          m.role === "assistant" ?
          <div key={i} className="ai-msg">
                {m.content}
              </div> :

          <div key={i} className="user-msg">{m.content}</div>

          )}
        </div>
        <div className="quick-chips" style={{ fontSize: "12px" }}>
          {quickActions.map((a) =>
          <button key={a.label} className="q-chip" onClick={() => onAction(a.label)}>
              {a.icon} {a.label}
            </button>
          )}
        </div>
        <div className="chat-input-area">
          <div className="input-box">
            <input
              type="text"
              placeholder="How else can I help?"
              value={val}
              onChange={(e) => setVal(e.target.value)}
              onKeyDown={(e) => {if (e.key === "Enter") submit();}} />

            <button className="input-icon-btn" aria-label={scribing ? "Stop scribing" : "Start scribing"} onClick={onToggleScribe}>
              {scribing ? <span className="rec-dot" /> : I.Mic}
            </button>
            <button
              type="button"
              onClick={addAsObservation}
              disabled={!hasText}
              aria-label="Send and add to context"
              title="Sends the message and saves it as an observation in the context."
              style={{
                width: 40, height: 40,
                background: "var(--teal-tint)",
                border: "1px solid var(--teal-border)",
                borderRadius: 8,
                color: "var(--teal)",
                display: "inline-flex", alignItems: "center", justifyContent: "center",
                cursor: hasText ? "pointer" : "not-allowed",
                opacity: hasText ? 1 : 0.5,
                transition: "opacity 120ms, background 120ms",
                flexShrink: 0
              }}>
              {React.cloneElement(I.Plus, { width: 20, height: 20, strokeWidth: 2 })}
            </button>
            <button className="send-btn" onClick={submit}>{I.Send}</button>
          </div>
        </div>
      </div>);

  }

  const CONSULT_GROUPS = [
  {
    id: "anamnesis",
    title: "Anamnesis",
    icon: I.Notebook,
    sections: [
    { key: "complaints", title: "Complaints", required: true },
    { key: "hpi", title: "History of present illness", required: true },

    icon: I.Clipboard,
    sections: [
    { key: "dx", title: "Diagnosis", required: true, kind: "dx" },
    { key: "ddx", title: "Differential diagnosis" },

    { key: "recs", title: "Recommendations" },
    { key: "diagPlan", title: "Diagnostic and consultation plan" },
    { key: "notes", title: "Notes" }]

  }];


  function statusOf(sec, val) {
    if (sec.kind === "dx") return val && val.code ? val.ai === "drafted" ? "drafted" : "edited" : "missing";
    if (sec.kind === "vitals") {
      const empty = !val || !val.value || Object.values(val.value).every((x) => !String(x).trim());
      if (empty) return "missing";
      return val.ai === "drafted" ? "drafted" : "edited";
    }
    const c = val && val.value;
    if (!c || !String(c).trim()) return "missing";
    return val.ai === "drafted" ? "drafted" : "edited";
  }

  function Badge({ status }) {
    const big = { fontSize: 13, height: 24, padding: "0 10px", gap: 6, borderRadius: 999 };
    if (status === "drafted") return <span className="badge b-ai" style={big}>{React.cloneElement(I.Sparkles, { width: 13, height: 13 })} AI drafted</span>;
    if (status === "edited") return <span className="badge b-edit" style={big}>{React.cloneElement(I.Pencil, { width: 13, height: 13 })} Edited</span>;
    return <span className="badge b-miss" style={big}>{React.cloneElement(I.Alert, { width: 13, height: 13 })} Missing</span>;
  }

  function AutoGrowTextarea({ value, onChange, style, ...rest }) {
    const ref = useRef(null);
    const resize = () => {
      const el = ref.current;
      if (!el) return;
      el.style.height = "auto";
      el.style.height = el.scrollHeight + "px";
    };
    useEffect(() => { resize(); }, [value]);
    return (
      <textarea
        ref={ref}
        value={value}
        onChange={(e) => { onChange(e); resize(); }}
        style={{ resize: "none", overflow: "hidden", ...style }}
        {...rest} />);

  }

  function SectionField({ sec, val, onChange }) {
    const status = statusOf(sec, val);
    if (sec.kind === "vitals") {
      const v = val && val.value || {};
      const keys = Object.keys(v).length ? Object.keys(v) : ["BP", "HR", "SpO₂", "Temp", "Weight", "Height"];
      return (
        <div className="field-row" style={{ padding: "20px 0", gap: 10 }}>
          <div className="field-header">
            <span className="f-label" style={{ fontSize: 15, fontWeight: 500 }}>{sec.title}</span>
            {status !== "drafted" && <Badge status={status} />}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px" }}>
            {keys.map((k) =>
            <div key={k} style={{ padding: "6px 10px", background: "#FAFAFA", border: "1px solid var(--border)", borderRadius: 8 }}>
                <div style={{ fontSize: 12, color: "var(--muted-3)", fontWeight: 600, textTransform: "uppercase" }}>{k}</div>
                <input
                value={v[k] || ""}
                onChange={(e) => onChange({ ai: "edited", value: { ...v, [k]: e.target.value } })}
                placeholder="—"
                style={{ width: "100%", background: "transparent", border: "none", outline: "none", fontSize: 14, fontVariantNumeric: "tabular-nums", color: "var(--ink)", marginTop: 4 }} />
              
              </div>
            )}
          </div>
        </div>);

    }
    if (sec.kind === "dx") {
      const v = val || { code: "", label: "", suggestions: [] };
      return (
        <div className="field-row" style={{ padding: "20px 0", gap: 10 }}>
          <div className="field-header">
            <span className="f-label" style={{ fontSize: 15, fontWeight: 500 }}>{sec.title}{sec.required && <span className="f-req">*</span>}</span>
            {status !== "drafted" && <Badge status={status} />}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input
              value={v.code}
              onChange={(e) => onChange({ ...v, code: e.target.value, ai: "edited" })}
              placeholder="TLK-10"
              style={{ width: 100, padding: "8px 10px", background: "#FAFAFA", border: "1px solid var(--border)", borderRadius: 8, fontSize: 14, outline: "none", fontVariantNumeric: "tabular-nums" }} />
            
            <input
              value={v.label}
              onChange={(e) => onChange({ ...v, label: e.target.value, ai: "edited" })}
              placeholder="Search diagnosis…"
              style={{ flex: 1, padding: "8px 10px", background: "#FAFAFA", border: "1px solid var(--border)", borderRadius: 8, fontSize: 14, outline: "none" }} />
            
          </div>
          {v.suggestions && v.suggestions.length > 0 &&
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {v.suggestions.map((s) =>
            <button
              key={s.code}
              onClick={() => onChange({ ...v, code: s.code, label: s.label, ai: "drafted" })}
              className="badge"
              style={{
                background: v.code === s.code ? "var(--teal)" : "#fff",
                color: v.code === s.code ? "#fff" : "var(--ink)",
                border: `1px solid ${v.code === s.code ? "var(--teal)" : "var(--border)"}`,
                cursor: "pointer",
                fontSize: 13,
                height: 28,
                padding: "0 14px",
                gap: 8,
                borderRadius: 999
              }}>

                  <span style={{ fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{s.code}</span> {s.label}
                </button>
            )}
            </div>
          }
        </div>);

    }
    const hideDrafted = status === "drafted";
    return (
      <div className="field-row" style={{ padding: "20px 0", gap: 10 }}>
        <div className="field-header">
          <span className="f-label" style={{ fontSize: 15, fontWeight: 500 }}>{sec.title}{sec.required && <span className="f-req">*</span>}</span>
          {!hideDrafted && <Badge status={status} />}
        </div>
        <AutoGrowTextarea
          className="f-area"
          placeholder="Add text…"
          value={val && val.value || ""}
          onChange={(e) => onChange({ ai: "edited", value: e.target.value })}
          style={{ fontSize: 15, lineHeight: 1.6 }} />

      </div>);

  }

  function VisitTab({ data, setData, onPush, pushState }) {
    const [openGroups, setOpenGroups] = useState({ anamnesis: true, objective: true, assessment: true });
    const toggle = (id) => setOpenGroups((o) => ({ ...o, [id]: !o[id] }));
    const change = (key, next) => setData((d) => ({ ...d, [key]: { ...d[key], ...next } }));
    const regenSection = (g) => {
      setData((d) => {
        const next = { ...d };
        g.sections.forEach((s) => {
          const status = statusOf(s, d[s.key]);
          if (status !== "edited") {
            const orig = M.consultation[s.key];
            next[s.key] = { ...orig, ai: "drafted" };
          }
        });
        return next;
      });
    };
    return (
      <>
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          marginBottom: 20, paddingBottom: 14,
          borderBottom: "1px solid var(--border-soft)"
        }}>
          <div>
            <div style={{ fontSize: 12, color: "var(--muted)", fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.06em" }}>Consultation note</div>
            <div style={{ fontSize: 16, fontWeight: 600, color: "var(--ink)", marginTop: 2 }}>E025</div>
          </div>
          <button
            onClick={onPush}
            disabled={pushState === "synced"}
            style={{
              height: 38, padding: "0 16px",
              background: pushState === "synced" ? "var(--teal-tint)" : "var(--teal)",
              border: pushState === "synced" ? "1px solid var(--teal-border)" : "none",
              borderRadius: 8,
              color: pushState === "synced" ? "var(--teal)" : "white",
              fontSize: 14, fontWeight: 500,
              display: "inline-flex", alignItems: "center", gap: 8,
              cursor: pushState === "synced" ? "default" : "pointer"
            }}>
            {pushState === "synced" ? React.cloneElement(I.Check, { width: 16, height: 16, strokeWidth: 2.4 }) : React.cloneElement(I.PushArrow, { width: 16, height: 16, strokeWidth: 2 })}
            {pushState === "synced" ? "Synced to E025" : "Push to E025"}
          </button>
        </div>
        {CONSULT_GROUPS.map((g, i) => {
          const open = openGroups[g.id];
          const missing = g.sections.filter((s) => s.required && statusOf(s, data[s.key]) === "missing").length;
          return (
            <div key={g.id} className="sec-card" style={{ paddingTop: i === 0 ? 0 : 28, paddingBottom: i === CONSULT_GROUPS.length - 1 ? 0 : 8 }}>
              <div className="sec-head" style={{ gap: 12, paddingBottom: 8 }}>
                <div className="sec-ico" style={{ width: 36, height: 36, borderRadius: 10 }}>
                  {React.cloneElement(g.icon, { width: 20, height: 20 })}
                </div>
                <span className="sec-title" style={{ fontSize: 16 }}>{g.title}</span>
                {missing > 0 &&
                <span className="badge b-miss" style={{ marginRight: 6, fontSize: 13, height: 24, padding: "0 10px", gap: 6, borderRadius: 999 }}>{React.cloneElement(I.Alert, { width: 13, height: 13 })} {missing} missing</span>
                }
                <button
                  onClick={() => regenSection(g)}
                  aria-label={`Regenerate ${g.title}`}
                  title="Refresh AI-drafted fields in this section. Your edits will be preserved."
                  style={{
                    height: 28, padding: "0 10px",
                    background: "var(--teal-tint)",
                    border: "1px solid var(--teal-border)",
                    borderRadius: 8,
                    color: "var(--teal)",
                    fontSize: 13, fontWeight: 500,
                    display: "inline-flex", alignItems: "center", gap: 6,
                    cursor: "pointer", marginLeft: "auto"
                  }}>
                  {React.cloneElement(I.Rotate, { width: 14, height: 14 })} Regenerate
                </button>
                <button className="sec-count" onClick={() => toggle(g.id)} aria-label={open ? "Collapse section" : "Expand section"} style={{ color: "var(--ink)" }}>
                  {React.cloneElement(open ? I.ChevUp : I.ChevDown, { width: 16, height: 16 })}
                </button>
              </div>
              {open &&
              <div className="sec-body">
                  {g.sections.map((s) =>
                <SectionField
                  key={s.key}
                  sec={s}
                  val={data[s.key]}
                  onChange={(v) => change(s.key, v)} />

                )}
                </div>
              }
            </div>);

        })}
      </>);

  }

  // ====================================================================
  // Transcription — 3 recordings, expandable
  // ====================================================================
  function Waveform({ progress, durationSec }) {
    const bars = 30;
    const heights = useMemo(() => {
      const arr = [];
      let seed = durationSec * 9301 + 49297;
      for (let i = 0; i < bars; i++) {
        seed = (seed * 9301 + 49297) % 233280;
        const r = seed / 233280;
        const env = 0.4 + 0.6 * Math.sin(i / bars * Math.PI);
        arr.push(0.25 + r * 0.75 * env);
      }
      return arr;
    }, [durationSec]);
    return (
      <div className="wave">
        {heights.map((h, i) =>
        <span
          key={i}
          className={i / bars < progress ? "played" : ""}
          style={{ height: `${Math.round(h * 100)}%` }} />

        )}
      </div>);

  }

  function EditableTranscriptLine({ value, onChange }) {
    const [editing, setEditing] = useState(false);
    const [draft, setDraft] = useState(value);
    const ref = useRef(null);
    useEffect(() => { if (editing && ref.current) { ref.current.focus(); ref.current.select(); } }, [editing]);
    useEffect(() => { if (!editing) setDraft(value); }, [value, editing]);
    const commit = () => { setEditing(false); if (draft !== value) onChange(draft); };
    const cancel = () => { setDraft(value); setEditing(false); };
    if (!editing) {
      return (
        <span
          className="txt"
          onClick={() => setEditing(true)}
          title="Click to edit"
          style={{ cursor: "text", borderRadius: 4, padding: "2px 4px", margin: "-2px -4px", transition: "background 120ms" }}
          onMouseEnter={(e) => e.currentTarget.style.background = "var(--border-soft)"}
          onMouseLeave={(e) => e.currentTarget.style.background = "transparent"}>
          {value}
        </span>);

    }
    return (
      <textarea
        ref={ref}
        value={draft}
        onChange={(e) => setDraft(e.target.value)}
        onBlur={commit}
        onKeyDown={(e) => {
          if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); commit(); }
          if (e.key === "Escape") { e.preventDefault(); cancel(); }
        }}
        rows={Math.max(1, draft.split("\n").length)}
        style={{
          fontFamily: "inherit", fontSize: "inherit", lineHeight: "inherit", color: "var(--ink)",
          width: "100%", background: "white",
          border: "1px solid var(--teal)", borderRadius: 6,
          padding: "4px 6px", margin: "-4px -6px",
          resize: "none", outline: "none"
        }} />);


  }

    }, []);

    useEffect(() => {
      if (!scribing) return;
      const id = setInterval(() => setSeconds((s) => s + 1), 1000);
      return () => clearInterval(id);
    }, [scribing]);

    useEffect(() => {
      if (scribing) setTab("transcription");
    }, [scribing]);

    const toggleScribe = useCallback(() => {
      setScribing((s) => {
        if (s) { setScribeMode(null); return false; }
        setSeconds(0);
        setScribeMode((m) => m || "in-person");
        return true;
      });
    }, []);
    const endCall = useCallback(() => {
      setScribing(false);
      setScribeMode(null);
    }, []);

    const STREAM_SCRIPT = useMemo(() => [
    { at: 3, t: "00:03", who: "Doctor", text: "Sveiki, papasakokite, dėl ko atvykote." },
    { at: 8, t: "00:08", who: "Patient", text: "Jaučiu tirpimą dešiniojo nykščio dalyje jau apie dvi savaites." },
    { at: 16, t: "00:16", who: "Doctor", text: "Ar tirpimas pastovus, ar atsiranda tik judant?" }],
    []);
    const liveLines = scribing ? STREAM_SCRIPT.filter((l) => l.at <= seconds).map(({ at, ...rest }) => rest) : [];

    const showToast = useCallback((m) => {
      setToast(m);
      if (toastTimer.current) clearTimeout(toastTimer.current);
      toastTimer.current = setTimeout(() => setToast(null), 2000);
    }, []);

    const sendUser = useCallback((text) => {
      setMessages((m) => [...m, { role: "user", content: text }]);
      setTimeout(() => {
        setMessages((m) => [
        ...m,
        { role: "assistant", content: `Looking into "${text}" — based on today's scribe and her history, I'd prioritise the wrist workup and a 3-month HbA1c recheck. Want me to draft the E025?` }]
        );
      }, 700);
    }, []);

    const runAction = useCallback((label) => {
      const map = {
        "Draft E025": { tab: "visit", reply: "Drafted the E025 from the scribing session — see the E025 tab. AI-populated sections are marked." },
        "Generate Referral (E027)": { tab: "referrals", reply: "Generated two E027 referral drafts (Cardiology, Neurology). Review them in the E027 tab." },
        "Draft Prescription": { tab: "visit", reply: "Drafted prescription: NSAID 200mg × 7 days, wrist splint." },
        "Order Tests": { tab: "labs", reply: "Ordered: HbA1c (follow-up in 3 mo), Lipid panel, TSH. See Labs." }
      };
      const a = map[label] || { tab: "visit", reply: "Done." };
      setMessages((m) => [...m, { role: "user", content: label }, { role: "assistant", content: a.reply }]);
      setTab(a.tab);
      setDraftSnapshot(sources.filter((s) => s.selected).map((s) => s.id));
    }, [sources]);

    const handlePush = () => {
      const miss = [];
      CONSULT_GROUPS.forEach((g) => g.sections.forEach((s) => {
        if (s.required && statusOf(s, data[s.key]) === "missing") miss.push(s);
      }));
      if (miss.length > 0) {
        setPushOpen({ missing: miss });
      } else {
        setPushOpen({ missing: [] });
      }
    };
    const confirmPush = () => {
      setPushOpen(false);
      setPushState("synced");
      showToast("Record pushed to E025");
    };

    let panel = null;
    if (tab === "visit") panel = (
      <>
        {isStale &&
        <div style={{
          display: "flex", alignItems: "flex-start", gap: 12,
          padding: "12px 14px", marginBottom: 16,
          background: "#FFFBEB", border: "1px solid #FDE68A", borderRadius: 8,
          color: "#92400E"
        }}>
            <div style={{ flexShrink: 0, color: "#92400E", display: "inline-flex", marginTop: 2 }}>
              {React.cloneElement(I.Alert, { width: 18, height: 18, strokeWidth: 2 })}
            </div>
            <div style={{ flex: 1, fontSize: 13, lineHeight: 1.5 }}>
              <div style={{ fontWeight: 600, marginBottom: 2 }}>Sources changed since this draft</div>
              <div>Regenerate will refresh {draftedCount} AI-drafted {draftedCount === 1 ? "field" : "fields"}{editedCount > 0 ? ` · your ${editedCount} ${editedCount === 1 ? "edit" : "edits"} will be preserved` : ""}.</div>
            </div>
            <button
            onClick={regenerate}
            style={{
              flexShrink: 0, height: 32, padding: "0 12px",
              background: "#92400E", color: "white",
              border: "none", borderRadius: 8,
              fontSize: 13, fontWeight: 500,
              cursor: "pointer"
            }}>
              Regenerate
            </button>
          </div>
        }
        <VisitTab data={data} setData={setData} onPush={handlePush} pushState={pushState} />
      </>);else

    if (tab === "patient") panel = <PatientTab />;else
    if (tab === "anamnesis") panel = <AnamnesisHistoryTab />;else
    if (tab === "labs") panel = <LabsTab />;else
    if (tab === "referrals") panel = <ReferralsTab />;else
    if (tab === "transcription") panel = <TranscriptionTab scribing={scribing} seconds={seconds} liveLines={liveLines} onStop={toggleScribe} />;

    return (
      <div className="app">
        <TopNav
          scribingLang={scribingLang}
          setScribingLang={setScribingLang}
          uiLang={uiLang}
          setUiLang={setUiLang} />

        {scribing && !isOnline &&
        <div style={{
          padding: "10px 24px",
          background: "#FFFBEB",
          borderBottom: "1px solid #FDE68A",
          color: "#92400E",
          fontSize: 13,
          lineHeight: 1.4,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          gap: 10,
          flexShrink: 0
        }}>
            {React.cloneElement(I.WifiOff, { width: 16, height: 16 })}
            <span><strong>You're offline — recording continues locally.</strong> Audio is being captured on this device; your transcript will sync as soon as you're back online.</span>
          </div>
        }

        <div className="body" style={{ gridTemplateColumns: "1fr 1fr 280px" }}>
          <div className="col">
            <ChatCard
              messages={messages}
              onSend={sendUser}
              onAction={runAction}
              scribing={scribing}
              scribeSeconds={seconds}
              onToggleScribe={toggleScribe}
              sources={sources}
              onToggleSource={toggleSource}
              onAddObservation={(t) => { addObservation(t); showToast("Added to context"); }} />

          </div>
          <div className="col">
            <PatientHeader />
            <div className="doc-pane">
              <DocTabs tab={tab} setTab={setTab} />
              <div className="doc-pane-body" style={{ borderRadius: "0px 14px 14px", padding: "18px" }}>
                {panel}
              </div>
            </div>
          </div>
          <div className="col">
            <ContextPanel sources={sources} onToggle={toggleSource} />
          </div>
        </div>
        {callOpen && <CallModal patient={M.patient} onClose={() => setCallOpen(false)} onConnected={() => { setCallOpen(false); setScribeMode("call"); if (!scribing) { setSeconds(0); setScribing(true); } }} />}
        {pushOpen && <PushModal missing={pushOpen.missing} onClose={() => setPushOpen(false)} onConfirm={confirmPush} />}
        <Toast msg={toast} />
      </div>);

  }

  window.ADAApp = App;
})();
  </script>

  <!-- Mount -->
  <script type="text/babel" data-presets="react">
    function tryMount() {
      if (!window.ADAApp || !window.ADA_MOCK) return setTimeout(tryMount, 30);
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.ADAApp));
    }
    tryMount();
  </script>
</body>
</html>
