document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

3px;color:#28403F;outline:none;\">\n            <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <!-- Antropometriniai duomenys -->\n          <div style=\"padding:22px 0;\">\n            <button onclick=\"{{ toggleAn }}\" style=\"width:100%;background:none;border:none;padding:0;display:flex;align-items:center;gap:12px;cursor:pointer;\">\n              <div style=\"width:40px;height:40px;border-radius:11px;background:#EEF4F4;display:flex;align-items:center;justify-content:center;color:#0C7A83;flex-shrink:0;\">\n                <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21.3 15.3a2.4 2.4 0 0 1 0 3.4l-2.6 2.6a2.4 2.4 0 0 1-3.4 0L2.7 8.7a2.4 2.4 0 0 1 0-3.4l2.6-2.6a2.4 2.4 0 0 1 3.4 0z\"><\u002Fpath><path d=\"M14.5 12.5l-2 2M11.5 9.5l-2 2M8.5 6.5l-2 2M17.5 15.5l-2 2\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <div style=\"flex:1;text-align:left;font-size:18px;font-weight:700;color:#16302F;\">Antropometriniai duomenys<\u002Fdiv>\n              <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9AA7A7\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"transform:{{ caretAn }};transition:transform .18s;\"><path d=\"M6 15l6-6 6 6\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n            <sc-if value=\"{{ openAn }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"margin-top:18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;\">\n              <input placeholder=\"ŪGIS, CM\" style=\"height:64px;padding:14px 16px;background:#F7FAFA;border:1px solid #E2EAEA;border-radius:12px;font-size:13px;color:#28403F;outline:none;\">\n              <input placeholder=\"SVORIS, KG\" style=\"height:64px;padding:14px 16px;background:#F7FAFA;border:1px solid #E2EAEA;border-radius:12px;font-size:13px;color:#28403F;outline:none;\">\n              <input placeholder=\"KMI\" style=\"height:64px;padding:14px 16px;background:#F7FAFA;border:1px solid #E2EAEA;border-radius:12px;font-size:13px;color:#28403F;outline:none;\">\n            <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isTrans }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;color:#9AA7A7;\">\n          <div style=\"width:56px;height:56px;border-radius:14px;background:#EEF4F4;display:flex;align-items:center;justify-content:center;color:#0C7A83;margin-bottom:16px;\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z\"><\u002Fpath><path d=\"M19 10v1a7 7 0 0 1-14 0v-1M12 18v3\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:15px;font-weight:500;color:#4E6362;\">Transkripcija dar nepradėta<\u002Fdiv>\n          <div style=\"font-size:13px;margin-top:6px;\">Paspauskite „Pradėti\", kad įrašytumėte pokalbį.<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ═ RIGHT: CONTEXT ═ -->\n    <div style=\"min-width:0;display:flex;flex-direction:column;overflow:hidden;padding-left:4px;\">\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:.08em;color:#9AA7A7;\">KONTEKSTAS<\u002Fdiv>\n      <div style=\"font-size:14px;font-weight:600;color:#37504F;margin-top:8px;\">1 iš 1 maitina generavimo veiksmus<\u002Fdiv>\n\n      <div style=\"margin-top:16px;background:#fff;border:1px solid #E2EAEA;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;\">\n        <div style=\"width:38px;height:38px;border-radius:10px;background:#EEF4F4;display:flex;align-items:center;justify-content:center;color:#0C7A83;flex-shrink:0;\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"display:flex;align-items:center;gap:5px;\">\n            <span style=\"font-size:14px;font-weight:600;color:#16302F;\">Pokalbio pastabos<\u002Fspan>\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9AA7A7\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"font-size:12px;color:#9AA7A7;margin-top:3px;\">Pastabų: 1<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ toggleSrc }}\" style=\"width:42px;height:24px;border-radius:999px;border:none;padding:0;cursor:pointer;background:{{ srcTrackBg }};position:relative;flex-shrink:0;transition:background .18s;\">\n          <div style=\"position:absolute;top:3px;left:{{ srcKnobLeft }};width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .18s;\"><\u002Fdiv>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"flex:1;\"><\u002Fdiv>\n\n      <div style=\"font-size:13px;color:#9AA7A7;line-height:1.6;\">Šaltinių perjungimas keičia tai, kas naudojama kitam generavimo veiksmui. Išjungti šaltiniai nebus naudojami, kol vėl neįjungsite.<\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { tab: 'E025', a: true, v: true, an: true, srcOn: true, rec: false, elapsed: 0, note: '', status: 'idle' };\n\n  fmt(t) {\n    const m = Math.floor(t / 60), r = t % 60;\n    return (m < 10 ? '0' : '') + m + ':' + (r < 10 ? '0' : '') + r;\n  }\n  toggleRec() {\n    if (this.state.rec) {\n      clearInterval(this._iv); this._iv = null;\n      this.setState({ rec: false });\n    } else {\n      this.setState({ rec: true, elapsed: 0, status: 'idle' });\n      this._iv = setInterval(() => this.setState(s => ({ elapsed: s.elapsed + 1 })), 1000);\n    }\n  }\n  onNote(e) {\n    const v = e.target.value;\n    clearTimeout(this._t1); clearTimeout(this._t2);\n    this.setState({ note: v, status: 'typing' });\n    this._t1 = setTimeout(() => {\n      this.setState({ status: 'saving' });\n      this._t2 = setTimeout(() => this.setState({ status: 'saved' }), 700);\n    }, 850);\n  }\n  componentWillUnmount() {\n    clearInterval(this._iv); clearTimeout(this._t1); clearTimeout(this._t2);\n  }\n\n  renderVals() {\n    const s = this.state;\n    const isE025 = s.tab === 'E025';\n    return {\n      isE025,\n      isTrans: s.tab === 'Transkripcija',\n      setE025: () => this.setState({ tab: 'E025' }),\n      setTrans: () => this.setState({ tab: 'Transkripcija' }),\n      e025Color: isE025 ? '#0C7A83' : '#8A9A9C',\n      e025Border: isE025 ? '#0C7A83' : 'transparent',\n      transColor: !isE025 ? '#0C7A83' : '#8A9A9C',\n      transBorder: !isE025 ? '#0C7A83' : 'transparent',\n      openA: s.a, openV: s.v, openAn: s.an,\n      caretA: s.a ? 'rotate(0deg)' : 'rotate(180deg)',\n      caretV: s.v ? 'rotate(0deg)' : 'rotate(180deg)',\n      caretAn: s.an ? 'rotate(0deg)' : 'rotate(180deg)',\n      toggleA: () => this.setState(st => ({ a: !st.a })),\n      toggleV: () => this.setState(st => ({ v: !st.v })),\n      toggleAn: () => this.setState(st => ({ an: !st.an })),\n      srcTrackBg: s.srcOn ? '#0C7A83' : '#D4DEDE',\n      srcKnobLeft: s.srcOn ? '21px' : '3px',\n      toggleSrc: () => this.setState(st => ({ srcOn: !st.srcOn })),\n\n      // recording / scribe\n      rec: s.rec,\n      elapsedFmt: this.fmt(s.elapsed),\n      toggleRec: () => this.toggleRec(),\n      scribeLabel: s.rec ? 'Įrašomas pokalbis' : 'Pasiruošę transkribuoti',\n      scribeAccent: s.rec ? '#DC2626' : '#0C7A83',\n      scribeBorder: s.rec ? '#F3C7C7' : '#DCE6E6',\n      scribeBg: s.rec ? '#FEF6F6' : '#ffffff',\n      recBtnLabel: s.rec ? 'Stabdyti' : 'Pradėti',\n      recBtnBg: s.rec ? '#DC2626' : '#ffffff',\n      recBtnBorder: s.rec ? '#DC2626' : '#0C7A83',\n      recBtnColor: s.rec ? '#ffffff' : '#0C7A83',\n\n      // doctor notes\n      note: s.note,\n      onNoteInput: (e) => this.onNote(e),\n      notesLocked: !s.rec,\n      stIdle: s.rec && s.status === 'idle',\n      stTyping: s.rec && s.status === 'typing',\n      stSaving: s.rec && s.status === 'saving',\n      stSaved: s.rec && s.status === 'saved',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
